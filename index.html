<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BIBLIOTECA DIGITAL · ARCHIVO PERONISMO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Press+Start+2P&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --cel: #75aadb;
            --cel2: #5a96cc;
            --gold: #f0c040;
            --gold2: #c8a020;
            --white: #f8f8ff;
            --dark: #000820;
            --grey: #8090c0;
            --pixel: 'Share Tech Mono', monospace;
            --title: 'Press Start 2P', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* Fondo pixelado celeste/blanco */
        body {
            font-family: var(--pixel);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            background: #000010;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Scanlines */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, .07) 3px, rgba(0, 0, 0, .07) 4px);
            pointer-events: none;
            z-index: 998;
        }

        /* Grid */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, .08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .08) 1px, transparent 1px);
            background-size: 16px 16px;
            pointer-events: none;
            z-index: 997;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        @keyframes flicker {

            0%,
            93%,
            100% {
                opacity: 1
            }

            94% {
                opacity: .2
            }

            96% {
                opacity: 1
            }

            99% {
                opacity: .15
            }
        }

        @keyframes float-px {
            from {
                transform: translateY(0) rotate(0);
                opacity: .5
            }

            to {
                transform: translateY(-130px) rotate(360deg);
                opacity: 0
            }
        }

        @keyframes led-pulse {

            0%,
            100% {
                box-shadow: 0 0 5px var(--cel)
            }

            50% {
                box-shadow: 0 0 18px var(--cel), 0 0 32px rgba(117, 170, 219, .5)
            }
        }

        @keyframes boot-in {
            from {
                opacity: 0;
                transform: translateY(-5px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes flash-save {
            0% {
                opacity: 1
            }

            50% {
                opacity: .3
            }

            100% {
                opacity: 1
            }
        }

        @keyframes rayo-glow {

            0%,
            100% {
                filter: drop-shadow(0 0 8px #f0c040) drop-shadow(0 0 20px #f08000);
            }

            50% {
                filter: drop-shadow(0 0 20px #ffee00) drop-shadow(0 0 40px #ff8800) drop-shadow(0 0 60px #ffcc00);
            }
        }

        @keyframes rayo-flash {
            0% {
                opacity: 0;
                transform: scaleY(0.8)
            }

            10% {
                opacity: 1;
                transform: scaleY(1.05)
            }

            20% {
                opacity: .6
            }

            30% {
                opacity: 1
            }

            100% {
                opacity: 1;
                transform: scaleY(1)
            }
        }

        /* BOOT OVERLAY */
        #boot-overlay {
            position: fixed;
            inset: 0;
            background: #000010;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity .6s;
        }

        #boot-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .boot-inner {
            width: min(660px, 92vw);
        }

        /* RAYO PERONIZADOR */
        .rayo-wrap {
            text-align: center;
            margin-bottom: 20px;
            animation: rayo-flash .8s ease-out forwards;
        }

        .rayo-svg {
            width: 60px;
            height: 120px;
            animation: rayo-glow 1.5s ease-in-out infinite;
        }

        .rayo-label {
            font-family: var(--title);
            font-size: clamp(6px, 1.2vw, 9px);
            color: var(--gold);
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--gold), 0 0 20px #ff8800;
            margin-top: 6px;
            display: block;
        }

        .boot-line {
            font-family: var(--pixel);
            font-size: clamp(9px, 1.5vw, 13px);
            line-height: 1.85;
            opacity: 0;
            white-space: pre;
            color: var(--cel);
        }

        .boot-line.show {
            opacity: 1;
            animation: boot-in .12s ease-out;
        }

        .boot-line.yellow {
            color: var(--gold)
        }

        .boot-line.white {
            color: #fffff0
        }

        .boot-line.green {
            color: #70ff70
        }

        .boot-line.red {
            color: #ff4040
        }

        .boot-line.grey {
            color: var(--grey)
        }

        .boot-line.cel {
            color: var(--cel)
        }

        .load-bar-wrap {
            margin-top: 18px;
            border: 2px solid var(--cel);
            padding: 3px;
            width: 100%;
            opacity: 0;
            transition: opacity .3s;
        }

        .load-bar-wrap.show {
            opacity: 1;
        }

        .load-bar-fill {
            height: 15px;
            background: var(--cel);
            width: 0%;
            transition: width .07s linear;
            position: relative;
            overflow: hidden;
        }

        .load-bar-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg, transparent 0, transparent 8px, rgba(0, 0, 0, .25) 8px, rgba(0, 0, 0, .25) 10px);
        }

        .load-bar-label {
            font-family: var(--pixel);
            font-size: 10px;
            color: var(--grey);
            margin-top: 5px;
            text-align: right;
        }

        /* HEADER */
        .main-header {
            width: 100%;
            background: rgba(0, 8, 32, .92);
            border-bottom: 3px solid var(--cel);
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .header-brand {
            font-family: var(--pixel);
            font-size: clamp(8px, 1vw, 11px);
            color: var(--grey);
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .header-brand span {
            color: var(--cel);
        }

        .header-title {
            font-family: var(--title);
            font-size: clamp(6px, 1.2vw, 10px);
            color: var(--cel);
            text-shadow: 2px 2px 0 var(--cel2);
            letter-spacing: 2px;
        }

        .online-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--pixel);
            font-size: 10px;
            color: var(--cel);
        }

        .led {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--cel);
            box-shadow: 0 0 6px var(--cel);
            animation: led-pulse 1.8s ease-in-out infinite;
        }

        .led-ring {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .led-label {
            font-size: 9px;
            color: var(--cel);
            letter-spacing: 1px;
        }

        .led-sub {
            font-size: 7px;
            color: #4a70b0;
        }

        /* FLOATS */
        .pixel-float {
            position: fixed;
            width: 5px;
            height: 5px;
            animation: float-px linear infinite;
            opacity: .4;
            z-index: 1;
            pointer-events: none;
        }

        /* ── LAYOUT DOS COLUMNAS ── */
        .layout-wrap {
            display: flex;
            flex-direction: row;
            align-items: center;             /* ambas columnas centradas verticalmente */
            justify-content: center;
            gap: 32px;
            width: 100%;
            max-width: 860px;
            margin: 0 auto;
            padding: 0 24px 18px 52px;     /* left offset para no tapar el planeta */
            height: calc(100vh - 52px);
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        /* COLUMNA FIGURA (izquierda) */
        .figura-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            width: 210px;

        }

        /* COLUMNA DASHBOARD (derecha) — más bajo que la figura */
        .dash-col {
            display: flex;
            flex-direction: column;
            flex: 1;
            max-width: 460px;
            min-width: 260px;

        }

        /* marco de la figura */
        .figura-frame {
            background: rgba(0, 8, 32, .88);
            border: 3px solid var(--cel);
            border-radius: 3px;
            box-shadow: 6px 6px 0 rgba(0, 0, 32, .8), 0 0 28px rgba(117, 170, 219, .2);
            padding: 8px 8px 10px;
            width: 100%;
            backdrop-filter: blur(8px);
        }

        /* marco del dashboard */
        .dash-frame {
            background: rgba(0, 8, 32, .88);
            border: 3px solid var(--cel);
            border-radius: 3px;
            box-shadow: 6px 6px 0 rgba(0, 0, 32, .8), 0 0 28px rgba(117, 170, 219, .2);
            padding: 10px 12px 14px;
            width: 100%;
            backdrop-filter: blur(8px);
        }

        @media(max-width:600px) {
            .layout-wrap {
                flex-direction: column;
                height: auto;
                padding: 10px 10px 10px 10px;
                gap: 14px;
            }
            .figura-col { width: 90vw; max-width: 300px; }
            .dash-col   { max-width: 90vw; }
        }

        .char-plate {
            font-family: var(--title);
            font-size: clamp(6px, .9vw, 8px);
            color: var(--cel);
            text-align: center;
            letter-spacing: 3px;
            padding: 7px 6px;
            border: 2px solid var(--cel);
            margin-bottom: 10px;
            background: #000;
            text-shadow: 0 0 10px var(--cel);
        }

        .pixel-canvas {
            display: block;
            margin: 0 auto;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            background: #000;
            box-shadow: 0 0 20px rgba(117, 170, 219, .25), 4px 4px 0 #000;
            border: 2px solid #0a1840;
            cursor: crosshair;
            width: 100%;
            height: auto;
            max-width: 436px;
        }

        .pixel-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 5px;
            margin: 10px 0 6px;
            background: rgba(0, 5, 20, .8);
            padding: 7px 9px;
            border: 2px solid #1a2a4a;
        }

        .tool-btn {
            background: #050015;
            border: 2px outset #2a3a5a;
            color: var(--cel);
            font-family: monospace;
            font-weight: bold;
            font-size: 12px;
            padding: 4px 9px;
            border-radius: 2px;
            cursor: pointer;
            box-shadow: 2px 2px 0 #000;
            transition: .05s;
        }

        .tool-btn:hover {
            background: #0a1030;
        }

        .tool-btn.active {
            background: #0a1840;
            border-color: var(--cel);
            box-shadow: inset 1px 1px 0 #000, 0 0 8px rgba(117, 170, 219, .4);
        }

        .color-picker-wrap {
            display: flex;
            align-items: center;
            background: rgba(0, 5, 20, .8);
            padding: 2px 6px;
            border: 1px solid #2a3a5a;
        }

        .brush-size {
            background: #050015;
            color: var(--cel);
            border: 2px solid #2a3a5a;
            padding: 2px 5px;
            font-size: 10px;
            font-family: var(--pixel);
        }

        /* NOTE CARD */
        .note-card {
            background: rgba(0, 5, 20, .8);
            border: 2px solid #1a2a4a;
            border-left: 4px solid var(--cel);
            padding: 8px;
            margin-top: 8px;
        }

        .daily-phrase {
            font-family: 'Share Tech Mono', monospace;
            background: rgba(0, 0, 0, .85);
            border-left: 4px solid #00ff41;
            border-top: 1px solid #003a0d;
            border-bottom: 1px solid #003a0d;
            padding: 10px 14px;
            margin-bottom: 8px;
            font-size: 9px;
            color: #00ff41;
            line-height: 1.9;
            white-space: pre-wrap;
            font-style: normal;
            text-shadow: 0 0 8px #00ff41, 0 0 16px rgba(0,255,65,0.4);
            letter-spacing: 0.4px;
            min-height: 3em;
            width: 100%;
        }
        /* cursor parpadeante DOS */
        @keyframes dos-cursor {
            0%,49%  { opacity: 1 }
            50%,100%{ opacity: 0 }
        }
        .dos-cursor {
            display: inline-block;
            width: 7px; height: 11px;
            background: #00ff41;
            vertical-align: middle;
            margin-left: 1px;
            animation: dos-cursor .65s step-end infinite;
            box-shadow: 0 0 6px #00ff41;
        }

        .saved-msg {
            font-family: var(--pixel);
            font-size: 9px;
            color: var(--cel);
            background: rgba(0, 0, 0, .5);
            border-left: 4px solid var(--cel);
            padding: 6px 10px;
            margin-bottom: 8px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 0;
            max-height: 120px;
            overflow-y: auto;
            display: none;
        }

        .saved-msg.visible {
            display: block;
            animation: flash-save .4s ease;
        }

        .save-status {
            font-size: 8px;
            color: #50a050;
            margin-left: 8px;
            opacity: 0;
            transition: opacity .3s;
        }

        .save-status.show {
            opacity: 1;
        }

        textarea {
            width: 100%;
            background: rgba(0, 4, 16, .8);
            border: 1px solid #2a3a5a;
            color: #ccddff;
            resize: vertical;
            font-family: var(--pixel);
            font-size: 10px;
            line-height: 1.7;
            padding: 6px;
            user-select: text;
        }

        textarea:focus {
            outline: 1px solid var(--cel);
            border-color: var(--cel);
        }

        textarea::placeholder {
            color: #334;
        }

        .note-footer {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-retro {
            background: #000;
            border: 2px solid var(--cel);
            color: var(--cel);
            font-family: var(--pixel);
            font-weight: bold;
            padding: 5px 12px;
            font-size: 9px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
            transition: .08s;
        }

        .btn-retro:hover {
            background: #081828;
            box-shadow: 1px 1px 0 #000;
        }

        .btn-biblioteca {
            background: #000;
            border: 2px solid var(--cel);
            color: var(--cel);
            font-family: var(--pixel);
            font-weight: bold;
            padding: 5px 12px;
            font-size: 8px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
            text-decoration: none;
            display: inline-block;
            transition: .08s;
            letter-spacing: 1px;
        }

        .btn-biblioteca:hover {
            background: #081828;
            box-shadow: 1px 1px 0 #000;
        }

        footer {
            margin: 22px 0;
            font-family: var(--title);
            font-size: clamp(5px, .9vw, 7px);
            color: var(--cel);
            text-shadow: 1px 1px 0 #2a5a8a;
            letter-spacing: 2px;
            text-align: center;
            animation: flicker 5s infinite;
            position: relative;
            z-index: 10;
        }

        @media(max-width:500px) {
            .art-piece {
                width: 95vw;
                min-width: 220px;
            }
        }
    </style>
</head>

    <div id="pixelFloats"></div>

    <!-- BOOT OVERLAY -->

            <div class="rayo-wrap" id="rayoWrap" style="display:none">

                    <polygon points="42,0 14,64 34,64 18,120 56,48 34,48 52,0" fill="#f0c040" />

                <div class="load-bar-label" id="loadBarLabel">CARGANDO... 0%</div>
            </div>
        </div>

    <script>
        (function () {
            "use strict";

            /* ====== FONDO CIELO ESTRELLADO PIXEL ART ====== */
            const bgCanvas = document.getElementById('bg-canvas');
            let bgW, bgH, stars=[], planets=[], moon={};
            const PS = 4; // pixel size for stars

            function initSpace() {
                bgW = window.innerWidth; bgH = window.innerHeight;
                bgCanvas.width = bgW; bgCanvas.height = bgH;
                // Generate stars
                stars = [];
                const numStars = Math.floor((bgW * bgH) / 800);
                for(let i=0; i<numStars; i++){
                    stars.push({
                        x: Math.random()*bgW, y: Math.random()*bgH,
                        size: Math.random()<0.15 ? 2 : 1,
                        bright: Math.random(),
                        speed: 0.3 + Math.random()*0.7,
                        phase: Math.random()*Math.PI*2,
                        color: ['#ffffff','#ffe4c4','#c8d8ff','#fffacd','#e0e8ff'][Math.floor(Math.random()*5)]
                    });
                }
                // Pixel planets
                planets = [
                    {x:bgW*0.15, y:bgH*0.20, r:12, color:'#c87040', ring:false, vx:0.18, vy:0.07, px:0,py:0, detail:'#a05828'},
                    {x:bgW*0.78, y:bgH*0.35, r:8,  color:'#4080c0', ring:false, vx:-0.12,vy:0.05, px:0,py:0, detail:'#306090'},
                    {x:bgW*0.60, y:bgH*0.12, r:18, color:'#c8a048', ring:true,  vx:0.08, vy:-0.04,px:0,py:0, detail:'#a08030'},
                    {x:bgW*0.88, y:bgH*0.75, r:7,  color:'#60c870', ring:false, vx:-0.09,vy:0.06, px:0,py:0, detail:'#40a050'},
                ];
                // Moon
                moon = {x:bgW*0.82, y:bgH*0.18, r:22, vx:0.05, vy:0.02, px:0, py:0};
            }

            function drawSpaceBg(t) {
                const c = bgCanvas, ctx = c.getContext('2d');
                ctx.clearRect(0,0,bgW,bgH);
                // Deep space gradient
                const grad = ctx.createLinearGradient(0,0,0,bgH);
                grad.addColorStop(0,'#000010');
                grad.addColorStop(0.5,'#050014');
                grad.addColorStop(1,'#000820');
                ctx.fillStyle=grad; ctx.fillRect(0,0,bgW,bgH);

                // Stars with twinkle
                const PX = PS;
                stars.forEach(s=>{
                    const tw = 0.5 + 0.5*Math.sin(t*s.speed + s.phase);
                    const alpha = 0.4 + 0.6*tw;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = s.color;
                    ctx.fillRect(Math.round(s.x/PX)*PX, Math.round(s.y/PX)*PX, s.size*PX, s.size*PX);
                });
                ctx.globalAlpha = 1;

                // Pixel planets (floating slowly)
                planets.forEach(p=>{
                    const ox = Math.sin(t*p.vx)*30, oy = Math.cos(t*p.vy)*20;
                    const cx = Math.round((p.x+ox)/PS)*PS, cy = Math.round((p.y+oy)/PS)*PS;
                    const r = p.r;
                    // Draw pixelated circle
                    for(let dy=-r; dy<=r; dy+=PS) for(let dx=-r; dx<=r; dx+=PS){
                        if(dx*dx+dy*dy<=r*r){
                            const shade = (dy<-r*0.2)?p.color:p.detail;
                            ctx.fillStyle=shade; ctx.fillRect(cx+dx,cy+dy,PS,PS);
                        }
                    }
                    // Ring for saturn-like
                    if(p.ring){
                        ctx.globalAlpha=0.5;
                        ctx.fillStyle='#d4b060';
                        for(let dx=-r*1.8; dx<=r*1.8; dx+=PS){
                            if(Math.abs(dx)>r*0.8){
                                ctx.fillRect(cx+dx, cy-PS, PS, PS);
                                ctx.fillRect(cx+dx, cy, PS, PS);
                            }
                        }
                        ctx.globalAlpha=1;
                    }
                    // Highlight
                    ctx.fillStyle='rgba(255,255,255,0.3)';
                    ctx.fillRect(cx-Math.round(r*0.4/PS)*PS, cy-Math.round(r*0.4/PS)*PS, PS*2, PS*2);
                });

                // Pixel Moon
                const mx = Math.round((moon.x + Math.sin(t*moon.vx)*25)/PS)*PS;
                const my = Math.round((moon.y + Math.cos(t*moon.vy)*15)/PS)*PS;
                const mr = moon.r;
                for(let dy=-mr; dy<=mr; dy+=PS) for(let dx=-mr; dx<=mr; dx+=PS){
                    if(dx*dx+dy*dy<=mr*mr){
                        const shade = (dx>mr*0.2)?'#5a5a6a':'#d8d8e8';
                        ctx.fillStyle=shade; ctx.fillRect(mx+dx,my+dy,PS,PS);
                    }
                }
                // Moon craters
                ctx.fillStyle='#b0b0c0';
                [[0.3,0.1,6],[-.2,.3,4],[.1,-.2,3]].forEach(([cx2,cy2,cr])=>{
                    for(let dy=-cr;dy<=cr;dy+=PS)for(let dx=-cr;dx<=cr;dx+=PS){
                        if(dx*dx+dy*dy<=cr*cr) ctx.fillRect(mx+cx2*mr+dx, my+cy2*mr+dy, PS, PS);
                    }
                });
                // Moon glow
                const mg = ctx.createRadialGradient(mx,my,mr*0.8,mx,my,mr*2.5);
                mg.addColorStop(0,'rgba(200,200,240,0.12)');
                mg.addColorStop(1,'rgba(0,0,0,0)');
                ctx.fillStyle=mg;
                ctx.beginPath();ctx.arc(mx,my,mr*2.5,0,Math.PI*2);ctx.fill();
            }

            let bgTime=0;
            function animateBg(){
                bgTime += 0.016;
                drawSpaceBg(bgTime);
                requestAnimationFrame(animateBg);
            }
            initSpace();
            animateBg();
            window.addEventListener('resize', ()=>{ initSpace(); });

            /* ====== AUDIO ====== */
            let audioCtx = null, audioReady = false;
            function initAudio() { if (audioCtx) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioReady = true; }
            function playModem() {
                if (!audioCtx) return;
                const ctx = audioCtx, master = ctx.createGain(); master.gain.setValueAtTime(0.15, ctx.currentTime); master.connect(ctx.destination);
                const seq = [[1200, 300, 'sine'], [2100, 200, 'sine'], [1200, 150, 'square'], [2400, 100, 'sawtooth'],
                [1800, 80, 'square'], [3600, 60, 'sawtooth'], [2100, 80, 'sine'], [1200, 60, 'square'],
                [4000, 40, 'sawtooth'], [3500, 30, 'sawtooth'], [3000, 30, 'sawtooth'], [2500, 30, 'square'],
                [2000, 30, 'square'], [1500, 40, 'square'], [2400, 20, 'square'], [4800, 15, 'sawtooth'],
                [800, 80, 'sine'], [1200, 80, 'sine'], [1600, 120, 'sine'], [2000, 200, 'sine']];
                let t = ctx.currentTime + 0.05;
                seq.forEach(([freq, durMs, type]) => {
                    const osc = ctx.createOscillator(), gain = ctx.createGain(), lfo = ctx.createOscillator(), lfoG = ctx.createGain();
                    osc.type = type; osc.frequency.setValueAtTime(freq, t);
                    lfo.frequency.value = 25 + Math.random() * 40; lfoG.gain.value = 30 + Math.random() * 80;
                    lfo.connect(lfoG); lfoG.connect(osc.frequency); lfo.start(t); lfo.stop(t + durMs / 1000 + 0.01);
                    gain.gain.setValueAtTime(0.8, t); gain.gain.exponentialRampToValueAtTime(0.01, t + durMs / 1000);
                    osc.connect(gain); gain.connect(master); osc.start(t); osc.stop(t + durMs / 1000 + 0.05);
                    t += durMs / 1000;
                });
            }
            function playBeep(freq, dur, type, vol) {
                if (!audioCtx) return; freq = freq || 440; dur = dur || 80; type = type || 'square'; vol = vol || 0.12;
                const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur / 1000);
                osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur / 1000 + 0.05);
            }
            function playJingle() {
                if (!audioCtx) return;
                const notes = [[523, 100], [659, 100], [784, 100], [1047, 200], [784, 80], [1047, 300]];
                let t = audioCtx.currentTime;
                notes.forEach(([f, d]) => { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square'; o.frequency.value = f; g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + d / 1000); o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + d / 1000 + 0.05); t += d / 1000; });
            }

            /* ====== BOOT ====== */
            const bootMsgs = [
                { text: '* * * BIBLIOTECA ESTEBAN ECHEVERRIA v2.0 * * *', cls: 'yellow', delay: 0 },
                { text: '64K RAM SYSTEM  ARCHIVO DOCUMENTAL PERONISMO', cls: 'white', delay: 180 },
                { text: '', cls: '', delay: 280 },
                { text: 'ASPR ORACLE NODE DETECTED .......... OK', cls: 'green', delay: 420 },
                { text: 'CARGANDO COLECCION PERONISMO ........ OK', cls: 'cel', delay: 680 },
                { text: 'CARGANDO JUAN DOMINGO PERON [1973]... OK', cls: 'cel', delay: 920 },
                { text: 'CARGANDO PIXEL ART ENGINE ........... OK', cls: 'cel', delay: 1160 },
                { text: 'CARGANDO SOUND CHIP SID ............. OK', cls: 'cel', delay: 1400 },
                { text: 'RAYO PERONIZADOR ACTIVADO ........... OK', cls: 'yellow', delay: 1640 },
                { text: '', cls: '', delay: 1900 },
                { text: 'CONNECTING TO MODEM...', cls: 'yellow', delay: 2100 },
                { text: '', cls: '', delay: 2300 },
                { text: 'ATDT 5550673... (EVITA WAS HERE)', cls: 'grey', delay: 2800 },
                { text: '', cls: '', delay: 3300 },
                { text: 'CONNECT 56600 BPS', cls: 'green', delay: 3700 },
                { text: 'PROTOCOL: V.90 PERONISTA-TURBO', cls: 'green', delay: 4000 },
                { text: '', cls: '', delay: 4200 },
                { text: 'SYSTEM READY.', cls: 'yellow', delay: 4700 },
            ];
            let bootStarted = false, soundFired = false;
            function runBoot() {
                const container = document.getElementById('bootLines');
                const barWrap = document.getElementById('loadBarWrap');
                const barFill = document.getElementById('loadBarFill');
                const barLabel = document.getElementById('loadBarLabel');
                // Show rayo at start
                setTimeout(() => { document.getElementById('rayoWrap').style.display = 'block'; }, 200);
                bootMsgs.forEach(msg => {
                    setTimeout(() => {
                        const line = document.createElement('div'); line.className = 'boot-line ' + (msg.cls || ''); line.textContent = msg.text;
                        container.appendChild(line); requestAnimationFrame(() => line.classList.add('show'));
                        if (msg.text.includes('MODEM') && !soundFired) { soundFired = true; setTimeout(() => { initAudio(); playModem(); }, 400); }
                        if (msg.text.includes('OK') && audioCtx) setTimeout(() => playBeep(1200, 50, 'square', 0.07), 200);
                        if (msg.text.includes('RAYO') && audioCtx) {
                            playBeep(880, 60, 'sawtooth', .12);
                            setTimeout(() => playBeep(1200, 80, 'sawtooth', .10), 80);
                            setTimeout(() => playBeep(1600, 120, 'sawtooth', .08), 160);
                        }
                    }, msg.delay);
                });
                setTimeout(() => {
                    barWrap.classList.add('show'); let pct = 0;
                    const steps = [[0, 'CARGANDO ARCHIVO...'], [20, 'APLICANDO RAYO...'], [40, 'COMPILANDO RETRATO...'], [60, 'SINTETIZANDO AUDIO...'], [80, 'ACTIVANDO GALERIA...'], [95, 'CASI LISTO...'], [100, 'PERONIA!']];
                    let si = 0;
                    const iv = setInterval(() => { pct = Math.min(100, pct + 0.8); barFill.style.width = pct + '%'; barLabel.textContent = steps[si][1] + ' ' + Math.floor(pct) + '%'; if (si < steps.length - 1 && pct >= steps[si + 1][0]) si++; if (pct >= 100) clearInterval(iv); }, 30);
                }, 1100);
                setTimeout(() => { if (audioCtx) playJingle(); setTimeout(() => { const ov = document.getElementById('boot-overlay'); ov.classList.add('fade-out'); setTimeout(() => ov.style.display = 'none', 650); }, 600); }, 5800);
            }
            function kickBoot() { if (bootStarted) return; bootStarted = true; initAudio(); runBoot(); }
            document.addEventListener('click', kickBoot, { once: true });
            document.addEventListener('keydown', kickBoot, { once: true });
            document.addEventListener('touchstart', kickBoot, { once: true });
            setTimeout(() => { if (!bootStarted) runBoot(); }, 500);

            /* ====== TOOLBAR REMOVIDA ====== */

            /* ====== TYPEWRITER FRASE ====== */
            (function(){
                const el = document.getElementById('dailyPhrase');
                const fullText = 'el amor entre los hombres habria conseguido\nmejores frutos en menos tiempo del\nque ha costado a la humanidad\nla siembra del rencor.\n\n— JDP  “La comunidad organizada”';
                const cursor = document.createElement('span');
                cursor.className = 'dos-cursor';
                let i = 0, startDelay = 4800; // empieza después del boot
                function typeNext(){
                    if(i <= fullText.length){
                        el.textContent = fullText.slice(0, i);
                        el.appendChild(cursor);
                        i++;
                        // velocidad variable: pausa en puntuacion
                        const ch = fullText[i-1] || '';
                        const delay = ch === '\n' ? 120 : ch === '.' || ch === ',' ? 90 : 38 + Math.random()*22;
                        setTimeout(typeNext, delay);
                    }
                    // cursor queda parpadeando al final
                }
                setTimeout(typeNext, startDelay);
            })();

            // Guardar nota con feedback
            const textarea = document.getElementById('peronTextarea');
            const savedDiv = document.getElementById('peronSaved');
            const statusEl = document.getElementById('peronStatus');
            const stored = localStorage.getItem('note_peron');
            if (stored) { textarea.value = stored; savedDiv.textContent = stored; savedDiv.classList.add('visible'); }
            textarea.addEventListener('mousedown', e => e.stopPropagation());
            textarea.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
            textarea.addEventListener('click', e => e.stopPropagation());
            textarea.addEventListener('focus', () => { if (audioReady) playBeep(600, 30, 'sine', .05); });
            document.getElementById('savePeronNote').addEventListener('click', e => {
                e.stopPropagation();
                const msg = textarea.value.trim(); if (!msg) return;
                localStorage.setItem('note_peron', msg);
                savedDiv.textContent = msg; savedDiv.classList.add('visible');
                statusEl.classList.add('show'); setTimeout(() => statusEl.classList.remove('show'), 2000);
                if (audioReady) { playBeep(660, 60, 'square', .08); setTimeout(() => playBeep(880, 80, 'square', .08), 80); }
            });

            // Floats celeste/blanco
            const fc = document.getElementById('pixelFloats');
            for (let i = 0; i < 24; i++) {
                const el = document.createElement('div'); el.className = 'pixel-float';
                el.style.left = Math.random() * 100 + 'vw'; el.style.top = (45 + Math.random() * 48) + 'vh';
                el.style.animationDuration = (4 + Math.random() * 7) + 's'; el.style.animationDelay = (Math.random() * 7) + 's';
                el.style.background = ['#ffffff', '#ffe4c4', '#c8d8ff', '#a0a0ff', '#ffff80', '#80ffc8'][Math.floor(Math.random() * 6)];
                fc.appendChild(el);
            }
        })();
    </script>
